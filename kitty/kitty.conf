# Kitty Configuration
# Docs: https://sw.kovidgoyal.net/kitty/conf/
# Ported from Ghostty + Kitty-specific enhancements

##############################
### PERFORMANCE ###
##############################

# Scrollback (matches Ghostty 100k)
scrollback_lines 100000

# Scrollback pager - open in less with ctrl+shift+h
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Ultra-low latency mode (prioritizes responsiveness over power)
repaint_delay 2
input_delay 0

# Sync to monitor refresh (reduces tearing)
sync_to_monitor yes

# Scrollback pager history - 100MB stored on disk for pager access
scrollback_pager_history_size 50

##############################
### WINDOW / KDE WAYLAND ###
##############################

# Let KDE handle window decorations
wayland_titlebar_color system
linux_display_server wayland

# Window size (matches Ghostty)
remember_window_size no
initial_window_width 120c
initial_window_height 40c

# Padding (matches Ghostty 16px)
window_padding_width 16

# Don't confirm on close (matches Ghostty)
confirm_os_window_close -1

# Window margins for splits
window_margin_width 2

# Resize behavior
resize_in_steps no

##############################
### APPEARANCE / OLED ###
##############################

# Catppuccin Mocha theme colors
# Base colors
foreground              #CDD6F4
background              #000000
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline
url_color               #F5E0DC

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Window borders
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Standard colors (Catppuccin Mocha)
# black
color0  #45475A
color8  #585B70
# red
color1  #F38BA8
color9  #F38BA8
# green
color2  #A6E3A1
color10 #A6E3A1
# yellow
color3  #F9E2AF
color11 #F9E2AF
# blue
color4  #89B4FA
color12 #89B4FA
# magenta
color5  #F5C2E7
color13 #F5C2E7
# cyan
color6  #94E2D5
color14 #94E2D5
# white
color7  #BAC2DE
color15 #A6ADC8

# Marks colors (for shell integration)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# Background opacity (1.0 = opaque for OLED)
background_opacity 1.0
background_blur 0

##############################
### FONT ###
##############################

font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto

font_size 12.0

# Thicken text (matches Ghostty font-thicken)
text_composition_strategy 1.0 0

# Ligatures - disable specific ones that are annoying in code
# Enable all ligatures by default
disable_ligatures never

# Nerd fonts symbol map (if you use them)
# symbol_map U+E0A0-U+E0A3,U+E0C0-U+E0C7 PowerlineSymbols

##############################
### CURSOR ###
##############################

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

# Cursor trail animation (subtle)
cursor_trail 3
cursor_trail_decay 0.1 0.3
cursor_trail_start_threshold 2

##############################
### MOUSE ###
##############################

# Hide mouse instantly when typing (negative = immediate)
mouse_hide_wait -1

# Copy on select (standard Linux behavior)
copy_on_select clipboard

# Strip trailing whitespace from copied text (except wrapped lines)
strip_trailing_spaces smart

# URL handling
url_style curly
open_url_with default
detect_urls yes
show_hyperlink_targets yes

# Click to place cursor
click_interval 0.5
focus_follows_mouse no

# Trackpad scroll speed (default 1.0, higher = faster)
touch_scroll_multiplier 2.0

##############################
### BELL ###
##############################

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "* "

##############################
### TAB BAR ###
##############################

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style round
tab_bar_min_tabs 1
tab_switch_strategy previous

tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

##############################
### SHELL INTEGRATION ###
##############################

# Full shell integration (requires shell plugin)
shell_integration enabled

# Notify when long commands finish (>30s, when window not focused)
notify_on_cmd_finish invisible 30.0 notify

##############################
### REMOTE CONTROL ###
##############################

# Enable remote control with password
allow_remote_control password
# Set your own password below:
# remote_control_password "your-password" send-text ls launch focus-window set-tab-title set-window-title

# Listen on socket for scripting
# listen_on unix:/tmp/kitty-$USER

##############################
### IMAGE PROTOCOL ###
##############################

# Allow programs to display images
# Use: kitty +kitten icat image.png
# Or: imgcat, etc.

##############################
### KEYBOARD SHORTCUTS ###
##############################

# Clear default shortcuts to start fresh
# clear_all_shortcuts yes

# --- Clipboard (matches Ghostty) ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# --- Tabs (matches Ghostty) ---
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
# Close current split only (use ctrl+shift+q to close entire tab)
map ctrl+shift+w close_window
map ctrl+shift+comma previous_tab
map ctrl+shift+period next_tab
map alt+shift+left move_tab_backward
map alt+shift+right move_tab_forward

# Direct tab access
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5

# --- Splits/Windows (matches Ghostty) ---
map ctrl+shift+r launch --location=vsplit --cwd=last_reported
map ctrl+shift+d launch --location=hsplit --cwd=last_reported

# Split navigation (matches Ghostty)
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right

# Zoom toggle (matches Ghostty)
map ctrl+shift+z toggle_layout stack

# Resize splits
map ctrl+alt+left resize_window narrower
map ctrl+alt+right resize_window wider
map ctrl+alt+up resize_window taller
map ctrl+alt+down resize_window shorter
map ctrl+alt+home resize_window reset

# --- Font size (matches Ghostty) ---
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# --- Scrolling (matches Ghostty) ---
map shift+home scroll_home
map shift+end scroll_end
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

# Scroll by line
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down

# --- KITTY-SPECIFIC FEATURES ---

# Scrollback pager - view full scrollback in less
map ctrl+shift+h show_scrollback

# Browse last command output
map ctrl+shift+g show_last_command_output

# --- Hints mode (Vimium-like) ---
# Open URL
map ctrl+shift+e open_url_with_hints

# Insert selected path
map ctrl+shift+p>f kitten hints --type path --program -

# Insert selected line
map ctrl+shift+p>l kitten hints --type line --program -

# Insert selected word
map ctrl+shift+p>w kitten hints --type word --program -

# Open selected path
map ctrl+shift+p>o kitten hints --type path

# Insert selected hash (git hashes, etc)
map ctrl+shift+p>h kitten hints --type hash --program -

# Open file:line in Zed (for tracebacks, errors)
map ctrl+shift+p>e kitten hints --type linenum --linenum-action=self zed {path}:{line}

# --- Broadcast (type to all windows) ---
map ctrl+shift+b launch --allow-remote-control kitty +kitten broadcast

# --- Window Management ---
# New OS window (default, documented here)
map ctrl+shift+n launch --type=os-window --cwd=last_reported

# Detach tab to new OS window
map ctrl+shift+o detach_window new-tab-left

# Cycle through layouts
map ctrl+shift+l next_layout

# --- Selection ---
# Quick select mode (keyboard-based selection)
map ctrl+shift+a>s kitten hints --type regex --regex '.+' --program -

# --- Markers (highlight patterns in output) ---
# Toggle marking error patterns
map ctrl+shift+m>e toggle_marker regex 1 (?i)(error|exception|fail|fatal)
# Toggle marking warning patterns
map ctrl+shift+m>w toggle_marker regex 2 (?i)(warn|warning|caution)
# Toggle marking success patterns
map ctrl+shift+m>s toggle_marker regex 3 (?i)(success|ok|pass|done)
# Clear all markers
map ctrl+shift+m>c remove_marker

# --- Quick Actions ---
# Clear scrollback and screen completely
map ctrl+shift+x clear_terminal scrollback active

# --- Config Management ---
# Reload config (F5 is the default)
map ctrl+shift+f5 load_config_file

# Toggle fullscreen
map ctrl+shift+f toggle_fullscreen

# Kitty shell (for debugging)
map ctrl+shift+escape kitty_shell window

# Unicode input
map ctrl+shift+u kitten unicode_input

# Reset terminal
map ctrl+shift+delete clear_terminal reset active

# SSH kitten (copies terminfo, enables shell integration on remote)
map ctrl+shift+s kitten ssh

##############################
### LAYOUTS ###
##############################

# Available layouts
enabled_layouts splits,stack,tall,fat,grid

# Default to splits (most flexible)

##############################
### ADVANCED ###
##############################

# Allow other programs to control kitty
allow_hyperlinks yes

# Update check (disable if you prefer)
update_check_interval 0

# Close on child death
close_on_child_death no

# Clipboard max size (10MB)
clipboard_max_size 10

# Wayland specific
wayland_enable_ime yes
