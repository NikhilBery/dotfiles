# tmux.conf — Catppuccin Mocha colors, vi keys, Kitty-compatible

# ─── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -g default-shell "/bin/zsh"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g display-time 1000
set -g status-interval 5
set-option -g allow-rename off

# Remove bell noise
set -g bell-action none
set -g visual-bell off
setw -g monitor-activity off
set -g visual-activity off

# ─── Splits ──────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation (vi-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt-arrow pane navigation (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Copy mode (vi) ─────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# ─── Windows ─────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind r command-prompt "rename-window '%%'"

# Alt+number window switching (no prefix needed)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# ─── Lazygit popup ────────────────────────────────────────────────────────────
bind C-g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"

# ─── Sesh session manager ────────────────────────────────────────────────────
bind-key C-s run-shell "sesh connect \"$(
  sesh list -t | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '> ' \
    --header '  ^a all ^t tmux ^x zoxide ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(> )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt(> )+reload(sesh list -t)' \
    --bind 'ctrl-x:change-prompt(> )+reload(sesh list -z)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(> )+reload(sesh list)'
)\""
bind-key C-l run-shell "sesh last"

# Clear scrollback (Ctrl+k, like in kitty)
bind -n C-k send-keys C-l \; clear-history

# ─── Reload config ──────────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Status bar (Catppuccin Mocha) ───────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e] "
set -g status-right "#[fg=#a6adc8] %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h "
set -g status-left-length 30
set -g status-right-length 50

setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I:#W "

# ─── Pane borders ───────────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"

# ─── Plugins (TPM) ──────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# Auto-install TPM if missing
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
