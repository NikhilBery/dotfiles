# aerc config — notmuch + lieer + Gmail

[general]
unsafe-accounts-conf = false
log-level = error
# Use 'trash' tag (not default 'deleted') so lieer syncs to Gmail Trash
default-menu-cmd =

[ui]
index-columns = date<20,name<25,flags>4,subject<*
column-date = {{.DateAutoFormat .Date.Local}}
column-name = {{index (.From | names) 0}}
column-flags = {{.Flags | join ""}}
column-subject = {{.ThreadPrefix}}{{.Subject}}
timestamp-format = 2006-01-02 15:04
this-day-time-format = 15:04
this-week-time-format = Mon 15:04
this-year-time-format = Jan 02
sidebar-width = 25
empty-message = (no messages)
mouse-enabled = false
styleset-name = catppuccin-mocha
fuzzy-complete = true
new-message-bell = true
threading-enabled = true
tab-title-account = {{.Account}}

[statusline]
status-columns = left<*,center>=,right>*
column-left = [{{.Account}}] {{.StatusInfo}}
column-center = {{.PendingKeys}}
column-right = {{.TrayInfo}}

[compose]
header-layout = To|From,Subject
reply-to-self = false
empty-subject-warning = true
no-attachment-warning = ^[^>]*attach
file-picker-cmd =
# Uncomment and edit to add a signature file
# signature-file = ~/.config/aerc/signature

[filters]
text/plain = colorize
text/html = w3m -dump -T text/html -o display_link_number=1 | colorize
message/delivery-status = colorize
message/rfc822 = colorize

[hooks]
mail-received = notify-send "New mail" "$AERC_FROM_NAME: $AERC_SUBJECT"

[templates]
new-message = new_message
quoted-reply = quoted_reply
forwards = forward_as_body
