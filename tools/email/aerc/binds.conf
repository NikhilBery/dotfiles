# aerc keybindings — vim-style

[messages]
q = :quit<Enter>

j = :next<Enter>
k = :prev<Enter>
J = :next 50%<Enter>
K = :prev 50%
gg = :select 0<Enter>
G = :select -1<Enter>

<Enter> = :view<Enter>
d = :prompt 'Delete this message?' 'delete-message'<Enter>
a = :archive flat<Enter>
C = :compose<Enter>

rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>
f = :forward<Enter>

c = :cf<space>
/ = :search<space>
\ = :filter<space>
n = :next-result<Enter>
N = :prev-result<Enter>

v = :mark -t<Enter>
V = :mark -v<Enter>
<Escape> = :unmark -a<Enter>

gi = :cf Inbox<Enter>
gs = :cf Sent<Enter>
ga = :cf Archive<Enter>
gd = :cf Drafts<Enter>

T = :toggle-threads<Enter>

<C-n> = :next-tab<Enter>
<C-p> = :prev-tab<Enter>

[messages:folder=Drafts]
<Enter> = :recall<Enter>

[view]
q = :close<Enter>
| = :pipe<space>
d = :delete<Enter>
a = :archive flat<Enter>
S = :save<space>
f = :forward<Enter>

rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

J = :next<Enter>
K = :prev<Enter>

<C-j> = :next-part<Enter>
<C-k> = :prev-part<Enter>
o = :open<Enter>

[compose]
<C-q> = :abort<Enter>
<tab> = :next-field<Enter>
<backtab> = :prev-field<Enter>

[compose::review]
y = :send<Enter>
n = :abort<Enter>
v = :preview<Enter>
p = :postpone<Enter>
q = :abort<Enter>
e = :edit<Enter>
a = :attach<space>
d = :detach<space>
